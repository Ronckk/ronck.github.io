<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rick | Drone & Media Creator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Reset & Basis Stijlen */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #16122c 0%, #07050f 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Tech-grid achtergrond effect */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
        }

        /* Het Visitekaartje / CV Container */
        .cv-card {
            position: relative;
            z-index: 2;
            background: rgba(22, 18, 44, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 242, 254, 0.25);
            border-radius: 30px;
            padding: 3rem 2rem;
            width: 100%;
            max-width: 650px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6),
                        0 0 40px rgba(0, 242, 254, 0.1);
        }

        /* Avatar / Drone Icoon met Pulse */
        .profile-img-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 1.5rem;
            background: linear-gradient(45deg, #ff007f, #00f2fe);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 25px rgba(0, 242, 254, 0.5);
            position: relative;
        }

        .profile-img-container i {
            font-size: 2.5rem;
            color: #fff;
        }

        /* Leeftijd Badge */
        .age-badge {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: #ff007f;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.5);
        }

        /* Naam met Neon Overloop */
        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
            background: linear-gradient(45deg, #00f2fe, #7928ca, #ff007f);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 6s linear infinite;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #00f2fe;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1.5rem;
            text-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }

        .bio {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #b0b0cc;
            margin-bottom: 2.5rem;
        }

        /* Expertise Grids (De categorieën) */
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .skill-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 1.2rem 0.5rem;
            transition: all 0.3s ease;
        }

        .skill-card:hover {
            transform: translateY(-5px);
            background: rgba(0, 242, 254, 0.05);
            border-color: #00f2fe;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        .skill-card i {
            font-size: 1.8rem;
            margin-bottom: 0.8rem;
            display: block;
        }

        /* Custom kleuren voor de icoontjes */
        .skill-card.nature i { color: #00ff88; text-shadow: 0 0 10px rgba(0, 255, 136, 0.3); }
        .skill-card.cars i { color: #ff007f; text-shadow: 0 0 10px rgba(255, 0, 127, 0.3); }
        .skill-card.weddings i { color: #00f2fe; text-shadow: 0 0 10px rgba(0, 242, 254, 0.3); }

        .skill-card h3 {
            font-size: 1rem;
            font-weight: 600;
        }

        /* Socials & Contact Knoppen */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .social-icon {
            font-size: 1.5rem;
            color: #b0b0cc;
            text-decoration: none;
            transition: all 0.3s ease;
            width: 50px;
            height: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .social-icon:hover {
            color: #ffffff;
            transform: scale(1.1);
        }

        .social-icon.instagram:hover { border-color: #ff007f; box-shadow: 0 0 15px rgba(255, 0, 127, 0.5); color: #ff007f; }
        .social-icon.youtube:hover { border-color: #ff0000; box-shadow: 0 0 15px rgba(255, 0, 0, 0.5); color: #ff0000; }
        .social-icon.email:hover { border-color: #00f2fe; box-shadow: 0 0 15px rgba(0, 242, 254, 0.5); color: #00f2fe; }

        /* CTA Boeken Knop */
        .cta-btn {
            display: block;
            width: 100%;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            text-decoration: none;
            background: linear-gradient(45deg, #ff007f, #7928ca);
            border-radius: 50px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .cta-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 35px rgba(255, 0, 127, 0.6),
                        0 0 15px rgba(0, 242, 254, 0.4);
            background: linear-gradient(45deg, #00f2fe, #7928ca);
        }

        /* Animatie voor de naam-gradient */
        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* Responsive voor telefoon */
        @media (max-width: 480px) {
            .skills-grid {
                grid-template-columns: 1fr;
            }
            h1 { font-size: 2.8rem; }
        }
    </style>
</head>
<body>

    <div class="cv-card">
        <div class="profile-img-container">
            <i class="fa-solid to fa-drone-front"><i class="fa-solid fa-helicopter"></i></i> <div class="age-badge">21 J/O</div>
        </div>

        <h1>HI, IK BEN RICK</h1>
        <div class="subtitle">Drone Pilot & Media Creator</div>
        
        <p class="bio">
            Gepassioneerd door unieke perspectieven en cinematic beelden. Vanuit de lucht of strak vanaf de grond: ik leg verhalen vast die impact maken. Scroll hieronder voor mijn specialiteiten.
        </p>

        <div class="skills-grid">
            <div class="skill-card nature">
                <i class="fa-solid fa-tree"></i>
                <h3>Natuur</h3>
            </div>
            <div class="skill-card cars">
                <i class="fa-solid fa-car-side"></i>
                <h3>Auto's</h3>
            </div>
            <div class="skill-card weddings">
                <i class="fa-solid fa-heart"></i>
                <h3>Bruiloften</h3>
            </div>
        </div>

        <div class="social-links">
            <a href="https://instagram.com" target="_blank" class="social-icon instagram">
                <i class="fa-brands fa-instagram"></i>
            </a>
            <a href="https://youtube.com" target="_blank" class="social-icon youtube">
                <i class="fa-brands fa-youtube"></i>
            </a>
            <a href="mailto:rick@example.com" class="social-icon email">
                <i class="fa-solid fa-envelope"></i>
            </a>
        </div>

        <a href="mailto:rick@example.com" class="cta-btn">Let's shoot some magic</a>
    </div>

</body>
</html>
